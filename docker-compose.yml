services:
  postgres:
    image: postgres:16-alpine
    container_name: srm-credit-engine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: srm_user
      POSTGRES_PASSWORD: srm_password
      POSTGRES_DB: srm_credit_engine
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U srm_user -d srm_credit_engine"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: srm-credit-engine-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@srm.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
