name: Backend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-ci.yml"

  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-validation:
    name: Build and test backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/backend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/srm_credit_engine?schema=public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm run test

      - name: Build backend
        run: npm run build
